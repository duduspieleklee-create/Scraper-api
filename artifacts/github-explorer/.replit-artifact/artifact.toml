kind = "web"
previewPath = "/"
title = "GitHub Explorer"
version = "1.0.0"
id = "artifacts/github-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18759

[services.development]
run = "pnpm --filter @workspace/github-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/github-explorer", "run", "build" ]
publicDir = "artifacts/github-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18759"
BASE_PATH = "/"
