<!DOCTYPE html>
<html>
<head><title>Dashboard</title></head>
<body>
    <h1>Kleinanzeigen Dashboard</h1>
    <p>Anzahl Suchen: {{ searches|length }}</p>
    <ul>
        {% for search in searches %}
        <li>{{ search.name }} - {{ search.keyword }} ({{ search.interval_minutes }} min) - {{ 'Aktiv' if search.enabled else 'Pausiert' }}</li>
        {% endfor %}
    </ul>
</body>
</html>
